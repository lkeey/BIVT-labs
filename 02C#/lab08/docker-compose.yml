version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: lab08_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: rss_news
      MYSQL_USER: rss_user
      MYSQL_PASSWORD: rss_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
